  - "uuid@9 deprecation warning during npm install; functionality unaffected for Node.js CommonJS usage."
  - "The /tmp directory on macOS resolves to /var/folders/... which is blocked by the PROTECTED_PREFIXES list. Test signup must use a home-directory path. This is correct behavior per spec."
  - "The 'Open Existing Profile' modal flow requires DATA_DIR to already be set in .env. If a user finds an existing profile at a new path, they must update .env manually. A dedicated /api/profile/open endpoint could resolve this in a future gap."
  - "Enhancement build (gate_bypass:true): replaced showSectionPlaceholder with showAcademicDetail, showTestsDetail, showAchievementsDetail, showActivitiesDetail. Added GET /api/profile/section/:name backend endpoint. impact_statements and essays placeholders now redirect to their proper routes."
  - "Bug-fix build (gate_bypass:true, v1.1.2): added full CRUD for Activities, Achievements, and AP/IB Exam Scores. AP/IB scores exist in two storage locations (academic.json apIbScores for legacy, tests.json data.ap/data.ib for spec-defined). All new endpoints search both. Documented in gap-2026-06-14.md."
  - "Bug-fix build (gate_bypass:true, 2026-06-15): Fixed broken back navigation on achievements, activities, academic, tests, impact statements, essays, and settings pages. Root causes: (1) showImpactStatementsList used history.back() which navigated to duplicate history entry instead of dashboard; (2) double-pushState: appNavigate() called pushState then each render function called pushState again, creating duplicate history entries requiring 2 browser-back clicks to navigate. Fixed by: changing all router-dispatched render functions (showDashboard, showSettings, showImpactStatementsList, showEssaysList, showAcademicDetail, showTestsDetail, showAchievementsDetail, showActivitiesDetail) from history.pushState to history.replaceState; changing showImpactStatementsList back button from history.back() to appNavigate('/'); changing showImpactGenerator back button from showDashboard() direct call to appNavigate('/')."
