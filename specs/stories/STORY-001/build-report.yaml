warnings:
  - "Bug-fix build (gate_bypass:true, 2026-06-15): Removed profile completion progress bar from the dashboard. The 'Your Profile' heading and percentage label were also removed. The .ao-progress CSS class was retained because it is shared with onboarding step indicators and other progress elements."
