<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admissions Officer</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom styles -->
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <!-- Navbar (hidden during onboarding, visible on dashboard) -->
  <nav id="app-navbar" class="navbar navbar-dark bg-primary d-none">
    <div class="container-fluid">
      <a href="/" id="nav-home" class="navbar-brand fw-semibold text-white text-decoration-none" onclick="event.preventDefault(); appNavigate('/');">
        <i class="bi bi-mortarboard me-2"></i>Admissions Officer
      </a>
      <div class="d-flex align-items-center gap-3">
        <button
          type="button"
          id="nav-btn-upload"
          class="btn btn-sm btn-light ao-nav-upload-btn"
          title="Upload a document"
          aria-label="Upload a document"
        >
          <i class="bi bi-cloud-upload me-1"></i>
          <span class="d-none d-sm-inline">Upload</span>
        </button>
        <a href="/settings" id="nav-settings" class="text-white text-decoration-none d-flex align-items-center gap-1 small" title="Settings" onclick="event.preventDefault(); appNavigate('/settings');">
          <i class="bi bi-gear fs-5"></i>
          <span class="d-none d-sm-inline">Settings</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Screen container — JS swaps content here -->
  <main id="app-screen" class="container py-5"></main>

  <!-- Export Page (hidden by default; shown via SPA router) -->
  <section id="export-page" class="page-section" style="display:none;" aria-label="Export Profile">
    <div class="container py-4">
      <a href="/" id="btn-export-back" class="btn btn-link ps-0 mb-3"
         onclick="event.preventDefault(); history.back();">
        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
      </a>
      <h2 class="mb-4">Export Profile</h2>
      <div id="export-empty-warning" class="alert alert-warning d-none" role="alert">
        Your profile is empty — add data before exporting.
        <a href="/" class="alert-link ms-2" onclick="event.preventDefault(); appNavigate('/');">Go to Dashboard</a>
      </div>
      <div class="row g-3" id="export-panels">
        <!-- JSON card, PDF card, Share card injected by export.js -->
      </div>
    </div>
  </section>

  <!-- Revoke success alert (used by export page) -->
  <div id="revoke-success-alert" class="position-fixed top-0 start-50 translate-middle-x mt-3 d-none"
       style="z-index: 1100; min-width: 280px;">
    <div class="alert alert-success alert-dismissible shadow-sm" role="alert">
      Link revoked.
      <button type="button" class="btn-close" onclick="document.getElementById('revoke-success-alert').classList.add('d-none');"></button>
    </div>
  </div>

  <!-- Bootstrap 5 JS (for modals, tooltips) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api-client.js"></script>
  <script src="/js/ui-utils.js"></script>
  <script src="/js/export.js"></script>
  <!-- STORY-007: Limits settings panel and banner -->
  <script src="/js/limits-settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
